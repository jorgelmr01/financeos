<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FinanceOS — Financial Command Center</title>

<!-- Installable PWA: add to your iPhone/Android home screen to launch full-screen -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0d0b">
<meta name="color-scheme" content="dark light">
<meta name="application-name" content="FinanceOS">
<meta name="description" content="Your complete financial command center — accounts, credit cards, portfolio and earnings, 100% private in your browser.">

<!-- iOS home-screen app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanceOS">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%230a0d0b'/%3E%3Ctext%20y='23'%20font-family='Georgia%2Cserif'%20font-size='19'%20font-style='italic'%3E%3Ctspan%20x='8'%20fill='%238fe3a6'%3EF%3C/tspan%3E%3Ctspan%20fill='%23e5c97b'%3E/%3C/tspan%3E%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Spline+Sans+Mono:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="atmosphere" aria-hidden="true"></div>
<div class="grain" aria-hidden="true"></div>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">F<span>/</span></div>
      <div class="brand-name">Finance<em>OS</em></div>
      <div class="brand-tag">Command Center</div>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-action="nav" data-page="overview">
        <span class="nav-glyph">◉</span> Today
      </button>

      <div class="nav-section">Money</div>
      <button class="nav-item" data-action="nav" data-page="accounts">
        <span class="nav-glyph">▤</span> Accounts
      </button>
      <button class="nav-item" data-action="nav" data-page="cards">
        <span class="nav-glyph">▭</span> Credit Cards
      </button>
      <button class="nav-item" data-action="nav" data-page="portfolio">
        <span class="nav-glyph">◮</span> Portfolio
      </button>
      <button class="nav-item" data-action="nav" data-page="earnings">
        <span class="nav-glyph">✦</span> Income
      </button>
      <button class="nav-item" data-action="nav" data-page="budget">
        <span class="nav-glyph">◓</span> Budget
      </button>
      <button class="nav-item" data-action="nav" data-page="retirement">
        <span class="nav-glyph">◔</span> Retirement
      </button>

      <div class="nav-section">Grow</div>
      <button class="nav-item" data-action="nav" data-page="milestones">
        <span class="nav-glyph">✶</span> Milestones
      </button>
      <button class="nav-item" data-action="nav" data-page="learn">
        <span class="nav-glyph">✺</span> Learn
      </button>
      <button class="nav-item" data-action="nav" data-page="guide">
        <span class="nav-glyph">❖</span> Guide
      </button>
    </nav>

    <div class="sidebar-foot">
      <div class="networth-chip">
        <div class="chip-label">Net Worth</div>
        <div class="chip-value" id="sidebar-networth">—</div>
        <div class="chip-spark" id="sidebar-spark"></div>
      </div>
      <div class="sidebar-tools">
        <select id="currency-select" class="currency-select" title="Display currency" aria-label="Display currency">
          <option value="USD">USD $</option>
          <option value="MXN">MXN $</option>
          <option value="EUR">EUR €</option>
          <option value="GBP">GBP £</option>
        </select>
        <button class="tool-btn" id="theme-btn" data-action="toggle-theme" title="Switch to light mode" aria-label="Switch theme">☀</button>
        <button class="tool-btn" id="privacy-btn" data-action="toggle-privacy" title="Hide / show amounts" aria-label="Toggle privacy mode">◑</button>
        <button class="tool-btn" id="lock-btn" data-action="lock-now" title="Lock now" aria-label="Lock now" style="display:none">⛨</button>
        <div class="data-menu">
          <button class="tool-btn" data-action="toggle-data-menu" title="Data options" aria-label="Data options" aria-haspopup="true">⋯</button>
          <div class="data-menu-pop" id="data-menu-pop">
            <button data-action="app-settings">Settings — taxes &amp; API key…</button>
            <button data-action="pin-settings">PIN lock…</button>
            <button data-action="refresh-fx">Refresh exchange rates</button>
            <button data-action="export">Export data (.json)</button>
            <button data-action="import">Import data</button>
            <button data-action="sample">Load sample data</button>
            <button data-action="reset" class="danger">Erase everything</button>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <div id="nav-scrim" data-action="close-nav" aria-hidden="true"></div>

  <main class="main">
    <header class="topbar">
      <button class="nav-toggle" data-action="toggle-nav" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false">☰</button>
      <div class="topbar-head">
        <h1 class="page-title" id="page-title">Overview</h1>
        <div class="page-date" id="page-date"></div>
      </div>
      <div class="topbar-right" id="topbar-actions"></div>
    </header>
    <div id="page" class="page"></div>
  </main>

</div>

<div id="modal-root"></div>
<div id="toast-root" aria-live="polite" aria-atomic="false"></div>
<div id="chart-tip" role="status" aria-live="polite"></div>
<div id="lock-root"></div>
<input type="file" id="import-file" accept="application/json" hidden>
<input type="file" id="expense-file" accept=".csv,text/csv,text/plain" hidden>
<input type="file" id="statement-file" accept="application/pdf,.pdf" hidden>

<!-- PDF.js (vendored, self-hosted) — statement parsing runs entirely on-device -->
<script src="vendor/pdf.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/i18n.js"></script>
<script src="js/instruments.js"></script>
<script src="js/store.js"></script>
<script src="js/budget.js"></script>
<script src="js/statements.js"></script>
<script src="js/ui.js"></script>
<script src="js/learn.js"></script>
<script src="js/pages.js"></script>
<script src="js/app.js"></script>

<script>
  /* Register the service worker for offline use + home-screen install.
     Needs a secure context (https:// or localhost); skipped on file://. */
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {/* offline mode unavailable */});
    });
  }
</script>
</body>
</html>
